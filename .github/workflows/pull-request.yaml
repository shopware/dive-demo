# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  pull_request:
    branches: ["trunk"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Install job
  install:
      runs-on: ubuntu-latest
      steps:
          - name: Checkout DIVE
            uses: actions/checkout@main
          - name: Setup Node.js
            uses: actions/setup-node@main
          - name: Search for cached dependencies
            uses: actions/cache@main
            id: yarn-cache
            with:
                path: node_modules
                key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          - name: Install DIVE-Demo dependencies (if cache not found)
            if: steps.yarn-cache.outputs.cache-hit != 'true'
            run: yarn
  # Build job
  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout DIVE
        uses: actions/checkout@main
      - name: Search for cached dependencies
        uses: actions/cache@main
        id: yarn-cache
        with:
            path: node_modules
            key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install DIVE-Demo dependencies (if cache not found)
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn
      - name: Build
        run: yarn build
      - name: e2e
        run: yarn test:e2e
  # Deploy job
  deploy-dry-run:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Dry-run Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: './dist'          # your build output
          dry-run: true             # ← this passes “--dry-run” to git push
          git-config-name: 'CI Bot'
          git-config-email: 'ci@my.org'
