# Simple workflow for deploying static content to GitHub Pages
name: Pull Request

on:
  # Runs on pull requests targeting the default branch
  pull_request:
    branches: ["trunk"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Install job
  yarn-install:
    name: yarn install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DIVE-Demo
        uses: actions/checkout@main
      - name: Setup Node.js
        uses: actions/setup-node@main
      - name: Search for cached node_modules
        uses: actions/cache@main
        id: yarn-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install DIVE-Demo dependencies (if cache not found)
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile
  # Build job
  build:
    runs-on: ubuntu-latest
    needs: yarn-install
    steps:
      - name: Checkout DIVE-Demo
        uses: actions/checkout@main
      - name: Setup Node.js
        uses: actions/setup-node@main
      - name: Load node-modules from cache
        uses: actions/cache@main
        id: yarn-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Build
        run: yarn build
  playwright-install:
    name: playwright install
    runs-on: ubuntu-latest
    needs: yarn-install
    steps:
      - name: Checkout DIVE-Demo
        uses: actions/checkout@main
      - name: Setup Node.js
        uses: actions/setup-node@main
      - name: Load node-modules from cache
        uses: actions/cache@main
        id: yarn-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Search for cached playwright browsers
        uses: actions/cache@main
        id: playwright-cache
        with:
          path: .playwright-cache
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-cache
        run: yarn playwright install --with-deps
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [playwright-install, build]
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout DIVE-Demo
        uses: actions/checkout@main
      - name: Setup Node.js
        uses: actions/setup-node@main
      - name: Load node-modules from cache
        uses: actions/cache@main
        id: yarn-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Load playwright browsers from cache
        uses: actions/cache@main
        id: playwright-cache
        with:
          path: .playwright-cache
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-
      - name: Install Playwright system dependencies
        run: |
          # System dependencies must be installed in each job since each job runs on a fresh runner
          # and system packages can't be cached between jobs. This is minimal overhead.
          sudo apt-get --yes remove --purge man-db
          yarn playwright install-deps chromium firefox webkit
      - name: Log installed DIVE version
        run: |
          node -e "const fs = require('fs'); const demoPkg = JSON.parse(fs.readFileSync('./package.json', 'utf8')); const divePkg = JSON.parse(fs.readFileSync('./node_modules/@shopware-ag/dive/package.json', 'utf8')); console.log('Requested @shopware-ag/dive:', demoPkg.dependencies['@shopware-ag/dive']); console.log('Installed @shopware-ag/dive version:', divePkg.version);"
      - name: Run playwright tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-cache
          CI: true
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: xvfb-run --auto-servernum yarn test:e2e --headed --shard=${{ matrix.shard }}/4
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
